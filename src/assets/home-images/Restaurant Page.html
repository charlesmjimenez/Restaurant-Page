    <title>Restaurant Page</title>
  <script defer="" src="./Restaurant Page_files/main.js"></script><style>*,
*::after,
*::before {
  padding: 0;
  margin: 0;
}

body {
  height: 100vh;
  font-size: 18px;
}

#content {
  /* padding: 40px; */
  height: 100vh;
  background-color: lightgray;
}

.nav-bar {
  display: flex;
  justify-content: center;
}

button {
  margin: 20px;
  font-size: 25px;
}

button:hover {
  color: red;
}

/* home page */
.home-container {
  border: 2px red solid;
  height: 100%;
  padding: 40px;
  display: flex;
  align-items: center;
  /* justify-content: space-evenly; */
}

.left {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.left h2 {
  font-size: 80px;
}

.left button {
  width: 110px;
  font-size: 20px;
}

.right img {
  width: 600px;
  height: 600px;
  border-radius: 50%;
}

hr {
  margin: auto;
  width: 50%;
}

.home-heading {
  text-align: center;
  margin-bottom: 20px;
}

.home-paragraph {
  width: 50%;
  text-align: left;
  margin: 20px auto;
}

/* menu */
.menu-page-container {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.mains-container {
  width: 50%;
  display: flex;
  flex-direction: column;
  justify-content: space-evenly;
  gap: 30px;
}

.item {
  display: flex;
  justify-content: center;
  align-items: center;
  background-color: darkgray;
  border-radius: 10px;
}

.menu-img-placeholder {
  width: 150px;
  height: 200px;
}
